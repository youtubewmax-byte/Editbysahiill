<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHIL STUDIO | Professional Visuals</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --accent: #00d4ff; /* Electric Blue */
            --bg: #000000;
            --secondary: #ff004c; /* Netflix/Premium Red */
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 76, 0.05) 0%, transparent 40%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            text-align: center;
        }

        /* --- HERO --- */
        .hero {
            padding: 120px 20px 60px;
        }

        .sahil-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3.5rem, 15vw, 8rem);
            font-weight: 900;
            letter-spacing: -7px;
            background: linear-gradient(180deg, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(0, 212, 255, 0.4));
        }

        /* --- SLIDE BUTTONS --- */
        .slide-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
        }

        .slide-btn {
            width: 85%;
            padding: 25px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-weight: 900;
            font-family: 'Syncopate';
            font-size: 1rem;
            letter-spacing: 3px;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            border-top-right-radius: 60px;
            border-bottom-right-radius: 60px;
            border: 1px solid rgba(255,255,255,0.05);
        }
